services:
  # Definimos el servicio de nuestra base de datos
  db:
    image: postgres:16-alpine
    container_name: ownet_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ownet_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

# Le decimos a Docker que cree un disco duro virtual persistente
volumes:
  pgdata:
